version: '3.8'

services:
  # 1. Database ภายในเครื่อง (ไม่ต้องต่อ Mongo นอก)
  mongodb:
    image: mongo:6.0-jammy
    container_name: screenshot-ai-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - screenshot_net

  # 2. Backend (Express API Server)
  backend:
    build:
      context: ./backend
    container_name: screenshot-ai-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/screenshot_ai
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
    networks:
      - screenshot_net

  # 3. Frontend (Next.js Web UI)
  frontend:
    build:
      context: ./frontend
    container_name: screenshot-ai-frontend
    restart: always
    ports:
      - "3008:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - screenshot_net

volumes:
  mongo_data:

networks:
  screenshot_net:
    driver: bridge
